<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fast Copy</title>
    <style>
      :root {
        --accent: #667eea;
        --accent-secondary: #764ba2;
        --accent-shadow: rgba(102, 126, 234, 0.25);
        --accent-shadow-hover: rgba(102, 126, 234, 0.4);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 300px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", sans-serif;
        overflow: hidden;
        transition: background 0.3s ease, color 0.3s ease;
      }

      /* ── Light mode ── */
      body.theme-light {
        --bg-gradient-1: #f0f0f5;
        --bg-gradient-2: #e8e8f0;
        --bg-gradient-3: #f5f5fa;
        --text-primary: #1a1a2e;
        --text-secondary: #5a5a7a;
        --text-heading: #1a1a2e;
        --card-bg: rgba(0, 0, 0, 0.04);
        --card-border: rgba(0, 0, 0, 0.08);
        --card-bg-hover: rgba(0, 0, 0, 0.06);
        --url-text: #3a3a5a;
        --kbd-bg: rgba(0, 0, 0, 0.06);
        --kbd-border: rgba(0, 0, 0, 0.1);
        --kbd-text: #5a5a7a;
        --hint-text: #8b8ba3;
        background: linear-gradient(145deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
        color: var(--text-primary);
      }

      /* ── Dark mode ── */
      body.theme-dark {
        --bg-gradient-1: #0f0c29;
        --bg-gradient-2: #1a1a3e;
        --bg-gradient-3: #24243e;
        --text-primary: #e0e0e0;
        --text-secondary: #8b8ba3;
        --text-heading: #ffffff;
        --card-bg: rgba(255, 255, 255, 0.06);
        --card-border: rgba(255, 255, 255, 0.08);
        --card-bg-hover: rgba(255, 255, 255, 0.08);
        --url-text: #c8c8e0;
        --kbd-bg: rgba(255, 255, 255, 0.08);
        --kbd-border: rgba(255, 255, 255, 0.12);
        --kbd-text: #8b8ba3;
        --hint-text: #5a5a7a;
        background: linear-gradient(145deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
        color: var(--text-primary);
      }

      .container {
        padding: 24px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .header-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 16px var(--accent-shadow);
        transition: background 0.3s ease, box-shadow 0.3s ease;
      }

      .header-icon svg {
        width: 20px;
        height: 20px;
        color: white;
      }

      .header-text h1 {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-heading);
        letter-spacing: -0.3px;
      }

      .header-text p {
        font-size: 11px;
        color: var(--text-secondary);
        margin-top: 2px;
      }

      .url-display {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 16px;
        transition: all 0.2s ease;
      }

      .url-display:hover {
        background: var(--card-bg-hover);
        border-color: var(--accent-shadow);
      }

      .url-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--accent);
        font-weight: 600;
        margin-bottom: 6px;
        transition: color 0.3s ease;
      }

      .url-text {
        font-size: 13px;
        color: var(--url-text);
        word-break: break-all;
        line-height: 1.4;
        max-height: 60px;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        line-clamp: 3;
        -webkit-box-orient: vertical;
      }

      .copy-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 4px 16px var(--accent-shadow);
        letter-spacing: 0.2px;
      }

      .copy-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 24px var(--accent-shadow-hover);
      }

      .copy-btn:active {
        transform: translateY(0);
        box-shadow: 0 2px 8px var(--accent-shadow);
      }

      .copy-btn.copied {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        box-shadow: 0 4px 16px rgba(56, 239, 125, 0.25);
      }

      .copy-btn svg {
        width: 16px;
        height: 16px;
        transition: all 0.2s ease;
      }


      /* ── Donate button ── */
      .donate-section {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--card-border);
      }

      .donate-btn {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid rgba(255, 189, 46, 0.3);
        border-radius: 10px;
        background: rgba(255, 189, 46, 0.08);
        color: #c8900a;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        text-decoration: none;
        letter-spacing: 0.1px;
      }

      body.theme-dark .donate-btn {
        color: #f5c842;
        border-color: rgba(245, 200, 66, 0.25);
        background: rgba(245, 200, 66, 0.07);
      }

      .donate-btn:hover {
        background: rgba(255, 189, 46, 0.16);
        border-color: rgba(255, 189, 46, 0.5);
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(255, 189, 46, 0.15);
      }

      body.theme-dark .donate-btn:hover {
        background: rgba(245, 200, 66, 0.14);
        border-color: rgba(245, 200, 66, 0.4);
        box-shadow: 0 4px 14px rgba(245, 200, 66, 0.12);
      }

      .donate-btn svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      /* ── Shortcut / links ── */
      .shortcut-hint {
        text-align: center;
        margin-top: 16px;
        font-size: 11px;
        color: var(--hint-text);
      }

      .shortcut-hint kbd {
        display: inline-block;
        padding: 2px 6px;
        background: var(--kbd-bg);
        border: 1px solid var(--kbd-border);
        border-radius: 4px;
        font-family: inherit;
        font-size: 10px;
        color: var(--kbd-text);
      }

      .change-shortcut-link {
        display: block;
        text-align: center;
        margin-top: 12px;
        font-size: 14px;
        color: var(--accent);
        text-decoration: none;
        cursor: pointer;
        transition: color 0.2s ease;
      }

      .change-shortcut-link:hover {
        color: var(--accent-secondary);
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="header-icon">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"
            ></path>
            <path
              d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"
            ></path>
          </svg>
        </div>
        <div class="header-text">
          <h1 data-i18n="popupTitle">Fast Copy</h1>
          <p data-i18n="popupSubtitle">Copy URLs in one click</p>
        </div>
      </div>

      <div class="url-display">
        <div class="url-label" data-i18n="popupUrlLabel">Current URL</div>
        <div class="url-text" id="currentUrl" data-i18n="popupLoading">
          Loading...
        </div>
      </div>

      <button class="copy-btn" id="copyBtn">
        <svg
          id="copyIcon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path
            d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
          ></path>
        </svg>
        <span id="copyText" data-i18n="popupCopyBtn">Copy URL</span>
      </button>

      <!-- Donate -->
      <div class="donate-section">
        <a
          class="donate-btn"
          id="donateBtn"
          href="https://ko-fi.com/lucaslourencoo"
          target="_blank"
          rel="noopener noreferrer"
          data-i18n="donateBtn"
        >
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402C1 3.763 4.068 2 6.5 2c1.868 0 3.535.912 4.5 2.316C12 2.91 13.668 2 15.5 2 17.932 2 21 3.762 21 7.191c0 4.105-5.37 8.863-11 14.402z"/>
          </svg>
          Buy me a coffee ☕
        </a>
      </div>

      <a
        class="change-shortcut-link"
        id="changeShortcutBtn"
        data-i18n="changeShortcut"
        >Change shortcut</a
      >

      <div class="shortcut-hint">
        <span data-i18n="shortcutHint">Shortcut:</span>
        <span id="shortcutDisplay">
          <kbd>Ctrl</kbd> + <kbd>⇧</kbd> + <kbd>C</kbd>
        </span>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
