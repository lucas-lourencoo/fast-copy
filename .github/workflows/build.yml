name: Build & Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Zip dist
        run: cd dist && zip -r ../fast-copy.zip . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: fast-copy-${{ github.sha }}
          path: fast-copy.zip
