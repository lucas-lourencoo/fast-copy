name: Build & Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build:${{ matrix.browser }}

      - name: Zip dist-${{ matrix.browser }}
        run: cd dist-${{ matrix.browser }} && zip -r ../fast-copy-${{ matrix.browser }}.zip . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: fast-copy-${{ matrix.browser }}-${{ github.sha }}
          path: fast-copy-${{ matrix.browser }}.zip
